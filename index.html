<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubLearn — фильмы с субтитрами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background: #0b0b0b;
            color: #fff;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #f5c518;
        }
        .nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav a {
            color: #aaa;
            text-decoration: none;
            font-size: 16px;
        }
        .nav a:hover {
            color: #fff;
        }
        .search input {
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            background: #1e1e1e;
            color: #fff;
            width: 200px;
        }
        .films {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }
        .card {
            background: #151515;
            border-radius: 12px;
            padding: 12px;
            transition: 0.2s;
        }
        .card:hover {
            background: #1f1f1f;
        }
        .card img {
            width: 100%;
            border-radius: 8px;
            background: #222;
            height: 200px;
            object-fit: cover;
        }
        .card h3 {
            margin-top: 10px;
            font-size: 16px;
        }
        .card .rating {
            color: #f5c518;
        }
        .btn {
            display: inline-block;
            margin-top: 10px;
            background: #f5c518;
            color: #000;
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
        }
        .footer {
            margin-top: 50px;
            border-top: 1px solid #2a2a2a;
            padding-top: 20px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎬 SubLearn</div>
        <div class="nav">
            <a href="#">Фильмы</a>
            <a href="#">Сериалы</a>
            <a href="#">Мультфильмы</a>
            <a href="#">Словарь</a>
        </div>
        <div class="search">
            <input type="text" placeholder="Найти фильм...">
        </div>
    </div>

    <h2>🎥 Сейчас смотрят</h2>
    <div class="films">
        <div class="card">
            <img src="https://via.placeholder.com/300x200/1e1e1e/555?text=Фильм+1" alt="poster">
            <h3>Название фильма</h3>
            <div class="rating">⭐ 7.5</div>
            <a href="#" class="btn">Смотреть</a>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/300x200/1e1e1e/555?text=Фильм+2" alt="poster">
            <h3>Название фильма 2</h3>
            <div class="rating">⭐ 8.1</div>
            <a href="#" class="btn">Смотреть</a>
        </div>
    </div>

    <div class="footer">
        © 2026 SubLearn — учите языки с кино
    </div>
</body>
</html>
